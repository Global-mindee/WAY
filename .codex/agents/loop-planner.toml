반환(최종 텍스트 = 계획 초안 원문):
1. **Context** — 왜 이 작업인가 (1문단)
2. **자원 활용 계획 (의무)** — 보유 자원 4계층을 전수 검토한 "단계 × 사용 자원 × 사유" 표: (1) `skills/INDEX.md` 7개 카테고리 128종 (2) `agents/INDEX.md` 13종 (3) 플러그인 스킬(/deep-research·/insane-search — 세션 가용 여부 명시) (4) 내장 오케스트레이션(Workflow·Agent·서브에이전트 격리). 채택 0건 카테고리는 "해당 없음 — 사유 1줄"로 전수 검토 증명. **이 표가 빠진 초안은 무효**

description = "full-loop S3 계획 초안 보조 — 메인 세션이 최고 모델이 아닐 때 계획 품질을 최고 모델로 보장. 과제 명세(task-brief)와 리서치 노트를 받아 AC 체크리스트가 고정된 실행 계획 초안을 반환한다."
developer_instructions = """
